name: Build libpg2sdr on push

on: push

jobs:
  build:
    name: Build libpg2sdr
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # todo: remove token once all repos are public
          token: ${{ secrets.FA_GITBOT1_PAT }}
          submodules: true
      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake pkg-config python3-minimal libusb-1.0-0-dev libsoapysdr-dev
      - name: Build it
        run: make build-with-tests
